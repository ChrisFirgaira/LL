# LiteSpeed Configuration for Pop Attack UK
# Place this in your virtual host configuration or include it

# Document Root
docRoot                   $VH_ROOT/
vhDomain                  popattack.co.uk
vhAliases                 www.popattack.co.uk
adminEmails               admin@popattack.co.uk
enableGzip                1

# Index Files
indexFiles                index.html

# Access Control
accessControl {
  allow                   *
}

# Script Handler for SPA
scriptHandler {
  add                     lsphp81 php
}

# Rewrite Rules (matches your .htaccess)
rewrite {
  enable                  1
  autoLoadHtaccess        1
  
  rules                   <<<END_rules
  # Force HTTPS and non-www
  RewriteCond %{HTTPS} !=on [OR]
  RewriteCond %{HTTP_HOST} ^www\.popattack\.co\.uk$ [NC]
  RewriteRule ^(.*)$ https://popattack.co.uk/$1 [R=301,L]

  # Redirect /index.html to /
  RewriteRule ^index\.html$ / [R=301,L]
  
  # Handle all routes through index.html for SPA
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteRule . /index.html [L]
  END_rules
}

# Cache Settings
expires {
  enableExpires           1
  expiresByType           text/html=A3600
  expiresByType           text/css=A31536000
  expiresByType           application/javascript=A31536000
  expiresByType           text/javascript=A31536000
  expiresByType           image/*=A31536000
  expiresByType           font/*=A31536000
}

# Compression
gzip {
  enableGzip              1
  enableDynGzipCache      1
  gzipAutoUpdateStatic    1
  gzipStaticCompressLevel 6
  gzipMinFileSize         300
  gzipMaxFileSize         10M
  gzipCompressLevel       6
}

# Security Headers
extraHeaders {
  X-Content-Type-Options  nosniff
  X-Frame-Options         DENY
  X-XSS-Protection        "1; mode=block"
  Referrer-Policy         "strict-origin-when-cross-origin"
  Permissions-Policy      "geolocation=(), microphone=(), camera=()"
}

# Static File Serving
staticFileCache {
  expireInSeconds         31536000
  enableExpires           1
}

# Enable HTTP/2
http2 {
  enable                  1
  enableDynamicPush       1
}

# Performance Optimizations
tuning {
  maxConnections          2000
  maxSSLConnections       1000
  connTimeout            300
  maxKeepAliveReq        1000
  keepAliveTimeout       15
  sndBufSize             0
  rcvBufSize             0
  maxReqURLLen           32768
  maxReqHeaderSize       65536
  maxReqBodySize         2047M
  maxDynRespHeaderSize   32768
  maxDynRespSize         2047M
}